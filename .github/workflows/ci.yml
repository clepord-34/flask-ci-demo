name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Check code quality ──────────────────
  check-code:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/

  # ── JOB 2: Build Docker image ──────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: check-code          # Wait for Job 1 to pass first
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-app .

      - name: Verify image was created
        run: docker images | grep my-app